services:
  # ── API server (Node.js + Express + SQLite) ──────────────────────────────────
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_PATH: /app/data/kidsproject.db
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads   # child drawings + AI-generated sprites
      - db_data:/app/data       # SQLite database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/sessions/demo"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Session app (Vite build → nginx) ─────────────────────────────────────────
  session:
    build:
      context: .
      dockerfile: docker/session.Dockerfile
    ports:
      - "${SESSION_PORT:-3000}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
  db_data:
