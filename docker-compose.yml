services:
  # ── API server (Node.js + Express + SQLite) ──────────────────────────────────
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_PATH: /app/data/kidsproject.db
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads   # child drawings + AI-generated sprites
      - db_data:/app/data       # SQLite database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/sessions/demo"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Session app (Vite build → nginx) ─────────────────────────────────────────
  session:
    build:
      context: .
      dockerfile: docker/session.Dockerfile
    ports:
      - "${SESSION_PORT:-3000}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ── Optional: Ollama for local AI (no OpenAI key needed) ─────────────────────
  # Enable with:  docker compose --profile local-ai up --build -d
  #
  # Pull the vision model once after first start:
  #   docker compose exec ollama ollama pull gemma4:12b
  #
  # Set in .env (copy .env.local-ai):
  #   AI_PROVIDER=local
  #   LOCAL_BASE_URL=http://ollama:11434/v1
  #   LOCAL_CHAT_MODEL=gemma4:12b
  #
  # GPU note: requires nvidia-container-toolkit on the host.
  #   Install: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  #   Without it the deploy.resources block is silently ignored and Ollama runs on CPU (slow).
  ollama:
    image: ollama/ollama
    profiles: ["local-ai"]
    ports:
      - "11434:11434"       # also reachable from the host at localhost:11434
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  uploads:
  db_data:
  ollama_data:
