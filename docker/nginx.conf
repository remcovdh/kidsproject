server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the Express server
    location /api/ {
        proxy_pass         http://server:3002/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Forward uploaded-file requests to the server (drawings + generated sprites)
    location /uploads/ {
        proxy_pass http://server:3002/uploads/;
    }

    # Serve game templates as static files at the same origin (needed for localStorage sharing)
    location /games/ {
        alias /usr/share/nginx/games/;
        try_files $uri $uri/index.html =404;
    }

    # SPA catch-all: unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
